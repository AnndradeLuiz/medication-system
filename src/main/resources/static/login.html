<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGDMI - Login</title>
    <link rel="stylesheet" href="css/login-style.css">
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>SGDMI</h2>
            <p>Sistema de Gerenciamento e Dispensação de Medicamentos e Insumos</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="loginDocument">CPF ou Matrícula</label>
                <input type="text" id="loginDocument" placeholder="Digite seu acesso..." required autocomplete="off">
                <small id="loginHint">Apenas números para CPF, ou letras/números para Matrícula.</small>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Sua senha secreta" required>
            </div>

            <button type="submit" class="btn-primary">Entrar no Sistema</button>
        </form>

        <div id="errorMessage" class="error-message" style="display: none;">
            Credenciais inválidas. Tente novamente.
        </div>
    </div>
</div>

<script src="js/login-script.js"></script>
</body>
</html>
